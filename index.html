    <!-- Gallery Styles -->

<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="window.location='/'">kumpulenak</div>
            <span class="admin-badge" id="adminBadge">🔧 ADMIN</span>

            <!-- Tombol admin: Add, Export, Import (hanya visible untuk admin) -->
            <div class="admin-actions" id="adminActions">
                <button class="admin-btn" id="btnAddCard" onclick="openAddModal()" title="Tambah Card Baru">➕ Add</button>
                <button class="admin-btn" id="btnExportJSON" onclick="exportCards()" title="Export Data ke JSON">📤 Export</button>
                <label class="admin-btn" id="btnImportJSON" title="Import Data dari JSON">
                    📥 Import
                    <input type="file" id="importFileInput" accept=".json" onchange="importCards(event)" style="display:none;">
                </label>
            </div>

            <nav class="nav-tabs" id="navTabs">
                <div class="nav-tab-indicator" id="tabIndicator"></div>
                <button class="nav-tab active" data-tab="popular">popular</button>
                <button class="nav-tab" data-tab="cosplay">cosplay</button>
                <button class="nav-tab" data-tab="album">album</button>
            </nav>

            <div class="search-box" id="searchBox">
                <input type="text" placeholder="search..." id="searchInput" autocomplete="off">
                <button class="search-clear-btn" id="searchClearBtn" onclick="clearSearch()" title="Hapus pencarian">&times;</button>
                <button class="search-submit-btn" onclick="performSearch()" aria-label="Search">🔍</button>
            </div>

            <!-- Toggle Dark/Light Mode -->
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Ganti tema">🌙</button>
        </div>
    </header>

    <!-- ===== VERIFY BUTTON (hidden for admin) ===== -->

        id="verifyBtn">
        🔗 VERIFYING <br> Download (21mb) &amp; Watching (2:11)
    </a>

    <!-- ===== BANNER ===== -->
    <div class="banner">
        <div class="banner-img ad-space" id="adBannerHeader" style="border: none;">
            <script>
                atOptions = {
                    'key' : '2e8603e8d49f282cb2b6c51077745034',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://glamournakedemployee.com/2e8603e8d49f282cb2b6c51077745034/invoke.js"></script>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
        <div class="content-wrapper">
            <div class="section-label" id="sectionLabel">popular</div>
            <div class="card-grid" id="cardGrid">
                <!-- Cards injected by gallery.js -->
            </div>

            <!-- PAGINATION -->
            <div class="pagination" id="pagination">
                <!-- Pagination injected by gallery.js -->
            </div>

            <!-- AD BANNER CONTENT (Banner Bawah) -->
            <div class="ad-space" id="adBannerContent" style="margin: 16px auto 0; background: transparent; border: none; text-align: center;">
                <script>
                    atOptions = {
                        'key' : 'ac030fa023c7db2ca8b74d28f66aaccb',
                        'format' : 'iframe',
                        'height' : 250,
                        'width' : 300,
                        'params' : {}
                    };

                <script src="https://glamournakedemployee.com/ac030fa023c7db2ca8b74d28f66aaccb/invoke.js"></script>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#">how to download</a>
            <a href="#">contact</a>
            <a href="#">DMCA</a>
        </div>
        <p>All resources are shared by their respective owners. &copy; 2026 kumpulenak</p>
    </footer>

    <!-- ===== EDIT MODAL (admin only) ===== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
            <h2 id="editModalTitle">✏️ Edit Card</h2>
            <form id="editForm" onsubmit="saveCard(event)">
                <input type="hidden" id="editIndex">
                <div class="form-group">
                    <label class="form-label">Card Name / Title <span class="required">*</span></label>
                    <input type="text" id="editName" class="form-input" placeholder="Enter card name..." required>
                </div>
                <div class="form-group">
                    <label class="form-label">Link URL</label>
                    <input type="text" id="editLink" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL</label>
                    <input type="text" id="editImage" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label class="form-label">Date (mm/dd)</label>
                    <input type="text" id="editDate" class="form-input" placeholder="04/14">
                </div>
                <div class="form-group">
                    <label class="form-label">Views</label>
                    <input type="text" id="editViews" class="form-input" placeholder="1234">
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="editCategory" class="form-input">
                        <option value="popular">Popular</option>
                        <option value="cosplay">Cosplay</option>
                        <option value="album">Album</option>
                    </select>
                </div>
                <div class="form-group form-check-group">
                    <label class="form-check-label">
                        <input type="checkbox" id="editFeatured" class="form-check-input">
                        <span>⭐ Featured (Pin ke posisi pertama)</span>
                    </label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="form-submit">💾 Save Changes</button>
                    <button type="button" class="form-delete" id="btnDeleteCard" onclick="deleteCard()">🗑 Delete</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== VIDEO PLAYER MODAL ===== -->
    <div class="player-overlay" id="playerModal">
        <div class="player-content">
            <button class="player-close" id="playerCloseBtn">&times;</button>
            <div class="player-iframe-wrapper">
                <iframe id="playerIframe" src="" width="100%" height="400" frameborder="0" allowfullscreen
                    allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="player-info">
                <h3 class="player-title" id="playerTitle"></h3>
                <div class="player-meta">
                    <span id="playerDuration">⏱ --:--</span>
                    <span id="playerViews">👁 0</span>
                    <span id="playerDate">📅 ----</span>
                </div>
                <a class="player-open-tab" id="playerOpenTab" href="#" target="_blank" rel="noopener noreferrer">
                    🔗 Buka di Tab Baru
                </a>
            </div>
        </div>
    </div>

    <!-- ===== EDIT INDICATOR ===== -->
    <div class="edit-indicator" id="editIndicator">
        ⚙️ Edit Mode ON — Click any card to edit
    </div>

    <!-- ===== BACK TO TOP BUTTON ===== -->
    <button class="back-to-top" id="backToTop" onclick="scrollToTop()" title="Kembali ke atas">⬆</button>

    <!-- Config (rahasia, tidak di-upload ke GitHub) -->
    <script src="config.js"></script>
    <!-- Gallery Logic -->
    <script src="assets/js/gallery.js"></script>

</body>

</html>
