<!DOCTYPE html>
<html lang="id" data-theme="dark" prefix="og: https://ogp.me/ns#">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - kumpulenak</title>
    <meta name="description" content="Tonton video viral {{TITLE}} full HD no sensor gratis di kumpulenak.">
    <meta name="keywords" content="{{TITLE}}, video viral, kumpulenak, 18+, nsfw">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="{{TITLE}} - kumpulenak">
    <meta property="og:description" content="Tonton video viral {{TITLE}} full HD no sensor gratis di kumpulenak.">
    <meta property="og:image" content="{{IMAGE}}">
    <meta property="og:type" content="video.other">
    <link rel="canonical" href="https://www.kumpulenak.web.id/v/{{SLUG}}">
    
    <!-- CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Path relatif dari folder /v/ -->
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <style>
        .video-container {
            background: var(--bg-card);
            padding: 10px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .video-iframe {
            width: 100%;
            height: 60vh;
            border-radius: 8px;
        }
        @media (max-width: 768px) {
            .video-iframe { height: 40vh; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo">
                <h1>kumpul<span>enak</span></h1>
            </a>
            <div class="search-bar">
                <a href="/" style="color:var(--text-main);text-decoration:none;font-weight:600;background:var(--primary-color);padding:8px 16px;border-radius:8px;">🏠 Kembali ke Beranda</a>
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="main-content" style="padding-top: 100px; max-width: 1000px; margin: 0 auto; padding-bottom: 50px; min-height: 80vh;">
        <h1 style="margin-bottom: 20px; font-size: 1.8rem; color: var(--text-main);">{{TITLE}}</h1>
        
        <div class="video-container">
            <iframe class="video-iframe" src="{{EMBED_URL}}" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
        
        <div style="margin-bottom: 30px; display: flex; gap: 20px; color: var(--text-muted); font-size:0.95rem; font-weight:500;">
            <span>⏱ {{DURATION}}</span>
            <span>👁 {{VIEWS}} views</span>
            <span>📅 {{DATE}}</span>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="/" class="btn" style="background:var(--primary-color); color:var(--bg-main); padding:16px 32px; text-decoration:none; border-radius:12px; display:inline-block; font-weight:bold; font-size:1.1rem; box-shadow: 0 4px 15px rgba(255,51,102,0.4);">
                🔥 Jelajahi Ribuan Video Viral Lainnya
            </a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 kumpulenak. All rights reserved.</p>
    </footer>
</body>
</html>
