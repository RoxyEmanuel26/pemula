<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kumpulenak — Tonton Video Viral</title>
    <meta name="description" content="Tonton video viral full HD gratis di kumpulenak.">
    <meta name="robots" content="index, follow">
    <meta name="rating" content="adult">

    <!-- Performance Preconnects -->
    <link rel="preconnect" href="https://www.eporner.com">
    <link rel="preconnect" href="https://static-ca-cdn.eporner.com">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">

    <!-- CSS UTAMA -->
    <link rel="stylesheet" href="/assets/css/gallery.css">

    <!-- SEO Meta Tags -->
    <meta property="og:type" content="video.other">
    <meta property="og:site_name" content="kumpulenak">
    <meta id="ogTitle" property="og:title" content="Tonton Video Viral - kumpulenak">
    <meta id="ogDesc" property="og:description" content="Tonton video viral full HD gratis di kumpulenak.">
    <meta id="ogImage" property="og:image" content="">
    <meta id="ogUrl" property="og:url" content="">
    
    <style>
        .video-page-container { max-width: 1200px; margin: 80px auto 40px; padding: 0 20px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .video-details { margin-top: 25px; background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .video-title { font-size: 1.8rem; color: #fff; margin-bottom: 15px; font-weight: 700; }
        .video-meta { display: flex; flex-wrap: wrap; gap: 15px; color: #aaa; font-size: 0.95rem; margin-bottom: 20px; }
        .video-meta span { display: flex; align-items: center; gap: 6px; }
        .video-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .video-tag { background: rgba(232, 168, 0, 0.1); color: #e8a800; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; text-decoration: none; transition: all 0.3s ease; }
        .video-tag:hover { background: #e8a800; color: #000; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: #e8a800; text-decoration: none; font-weight: 600; margin-bottom: 20px; transition: opacity 0.3s ease; }
        .back-btn:hover { opacity: 0.8; }
        .loader { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #e8a800; border-radius: 50%; animation: spin 1s linear infinite; margin: 100px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { text-align: center; padding: 100px 20px; color: #ff4444; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">kumpul<span>enak</span></a>
        </div>
    </header>

    <!-- Ad Header Placeholder -->
    <div id="adBannerHeader" style="margin-top: 80px; text-align: center; min-height: 90px;"></div>

    <main class="video-page-container" id="videoContainer">
        <div class="loader" id="videoLoader"></div>
    </main>

    <!-- Script Injection (JSON-LD) -->
    <script id="jsonLdScript" type="application/ld+json"></script>

    <script>
        // Security Helper
        function isSafeUrl(url) {
            if (!url || typeof url !== 'string') return false;
            try {
                const u = new URL(url);
                return u.protocol === 'https:' || u.protocol === 'http:';
            } catch {
                return false;
            }
        }

        // Get video slug from query param or path
        const urlParams = new URLSearchParams(window.location.search);
        let videoId = urlParams.get('id') || urlParams.get('v');
        
        if (!videoId) {
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            const lastPart = pathParts[pathParts.length - 1] || '';
            videoId = lastPart.replace('.html', '');
            if (videoId === 'v' || videoId === 'video' || !videoId) {
                videoId = null;
            }
        }

        if (!videoId) {
            showError('Video ID tidak ditemukan.');
        } else {
            fetchVideoData(videoId);
        }

        async function fetchVideoData(id) {
            try {
                const response = await fetch('https://www.eporner.com/api/v2/video/id/?id=' + encodeURIComponent(id) + '&format=json');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                // Eporner returns an empty array [] if the video ID is not found
                if (!data || data.error || (Array.isArray(data) && data.length === 0)) {
                    showError('Video tidak ditemukan atau telah dihapus.');
                    return;
                }

                renderVideo(data);
                updateSEO(data);
            } catch (error) {
                console.error('Error fetching video:', error);
                showError('Gagal memuat video. Silakan coba lagi nanti.');
            }
        }

        function renderVideo(video) {
            const container = document.getElementById('videoContainer');
            container.innerHTML = ''; // Bersihkan loader

            const backBtn = document.createElement('a');
            backBtn.href = '/';
            backBtn.className = 'back-btn';
            backBtn.textContent = '← Kembali ke Beranda';
            container.appendChild(backBtn);

            if (video.embed && isSafeUrl(video.embed)) {
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper';
                
                const iframe = document.createElement('iframe');
                iframe.src = video.embed;
                iframe.setAttribute('frameborder', '0');
                iframe.setAttribute('allowfullscreen', 'true');
                iframe.setAttribute('scrolling', 'no');
                
                wrapper.appendChild(iframe);
                container.appendChild(wrapper);
            } else {
                showError('Embed URL tidak valid atau tidak aman.');
                return;
            }

            const details = document.createElement('div');
            details.className = 'video-details';

            const title = document.createElement('h1');
            title.className = 'video-title';
            title.textContent = video.title || 'Tanpa Judul';
            details.appendChild(title);

            const meta = document.createElement('div');
            meta.className = 'video-meta';
            
            const duration = document.createElement('span');
            duration.textContent = '⏱ ' + (video.length_min || '0:00');
            meta.appendChild(duration);

            const views = document.createElement('span');
            views.textContent = '👁 ' + (video.views || '0') + ' views';
            meta.appendChild(views);

            const rating = document.createElement('span');
            rating.textContent = '⭐ ' + (video.rate || '0') + ' rating';
            meta.appendChild(rating);

            details.appendChild(meta);

            // Tags
            if (video.keywords) {
                const tagsContainer = document.createElement('div');
                tagsContainer.className = 'video-tags';
                
                // Pisahkan string koma menjadi array
                const tagArray = typeof video.keywords === 'string' 
                    ? video.keywords.split(',').map(t => t.trim()) 
                    : video.keywords;
                    
                tagArray.forEach(tag => {
                    if (!tag) return;
                    const tagLink = document.createElement('a');
                    tagLink.className = 'video-tag';
                    tagLink.href = '/?q=' + encodeURIComponent(tag);
                    tagLink.textContent = tag;
                    tagsContainer.appendChild(tagLink);
                });
                
                details.appendChild(tagsContainer);
            }

            container.appendChild(details);
        }

        function updateSEO(video) {
            document.title = video.title + ' — kumpulenak';
            
            const desc = 'Tonton video ' + video.title + ' secara gratis dengan kualitas full HD di kumpulenak.';
            document.querySelector('meta[name="description"]').setAttribute('content', desc);
            
            // Open Graph
            document.getElementById('ogTitle').setAttribute('content', video.title);
            document.getElementById('ogDesc').setAttribute('content', desc);
            document.getElementById('ogUrl').setAttribute('content', window.location.href);
            
            if (video.default_thumb && video.default_thumb.src && isSafeUrl(video.default_thumb.src)) {
                document.getElementById('ogImage').setAttribute('content', video.default_thumb.src);
            }

            // JSON-LD Schema
            const schema = {
                "@context": "https://schema.org",
                "@type": "VideoObject",
                "name": video.title,
                "description": desc,
                "thumbnailUrl": (video.default_thumb && video.default_thumb.src) ? [video.default_thumb.src] : [],
                "uploadDate": new Date().toISOString(), // Fallback if API doesn't provide
                "duration": "PT" + (video.length_sec || 0) + "S",
                "embedUrl": video.embed || window.location.href,
                "interactionCount": video.views || "0"
            };

            document.getElementById('jsonLdScript').textContent = JSON.stringify(schema);
        }

        function showError(msg) {
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const errDiv = document.createElement('div');
            errDiv.className = 'error-state';
            
            const h2 = document.createElement('h2');
            h2.textContent = 'Oops!';
            errDiv.appendChild(h2);
            
            const p = document.createElement('p');
            p.textContent = msg;
            errDiv.appendChild(p);
            
            const backBtn = document.createElement('a');
            backBtn.href = '/';
            backBtn.className = 'back-btn';
            backBtn.style.marginTop = '20px';
            backBtn.textContent = '← Kembali ke Beranda';
            errDiv.appendChild(backBtn);
            
            container.appendChild(errDiv);
        }
    </script>
    
    <!-- Load Ads Script -->
    <script src="/assets/js/loader.js" defer></script>
</body>
</html>
