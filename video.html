        function isSafeUrl(url) {
            if (!url || typeof url !== 'string') return false;
            try {
                const u = new URL(url);
                return u.protocol === 'https:' || u.protocol === 'http:';
            } catch {
                return false;
            }

        // Decoder untuk memulihkan teks UTF-8 yang mengalami Mojibake dari API Eporner
        function decodeMojibake(str) {
            if (!str) return '';
            if (typeof TextDecoder === 'undefined') return str;
            
            var win1252Map = {
                0x20AC: 0x80, 0x201A: 0x82, 0x0192: 0x83, 0x201E: 0x84, 0x2026: 0x85, 
                0x2020: 0x86, 0x2021: 0x87, 0x02C6: 0x88, 0x2030: 0x89, 0x0160: 0x8A, 
                0x2039: 0x8B, 0x0152: 0x8C, 0x017D: 0x8E, 0x2018: 0x91, 0x2019: 0x92, 
                0x201C: 0x93, 0x201D: 0x94, 0x2022: 0x95, 0x2013: 0x96, 0x2014: 0x97, 
                0x02DC: 0x98, 0x2122: 0x99, 0x0161: 0x9A, 0x203A: 0x9B, 0x0153: 0x9C, 
                0x017E: 0x9E, 0x0178: 0x9F
            };

            var bytes = new Uint8Array(str.split('').map(function (c) {
                var code = c.charCodeAt(0);
                return win1252Map[code] || (code < 256 ? code : 0x3F);
            }));

            try {
                return new TextDecoder('utf-8').decode(bytes);
            } catch (e) {
                return str;
            }
        }

                                (v.length_min ? '<span class="badge-duration">' + v.length_min + '</span>' : '') +
                                (v.rate ? '<span class="badge-rating">⭐ ' + v.rate + '</span>' : '') +
                                '<img src="' + thumb + '" alt="Thumbnail" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;" onload="this.classList.add(\'loaded\')" onerror="this.classList.add(\'loaded\'); this.style.background=\'#333\';">' +
                            '</div>' +
                            '<div class="card-meta">' +
                                '<div class="card-date-views">' +
                                    '<span style="color:#aaa;">📅 ' + added + '</span>' +
                                    '<span style="color:#aaa;">👁 ' + views + '</span>' +
                                '</div>' +
                                '<div class="card-title" style="color:#fff;">' + title + '</div>' +
                            '</div>';
                            
                        grid.appendChild(a);
                    });
                }
            } catch (err) {
                console.error("Error fetching similar videos:", err);
            }
        }

        function showError(msg) {
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const errDiv = document.createElement('div');
            errDiv.className = 'error-state';
            
            const h2 = document.createElement('h2');
            h2.textContent = 'Oops!';
            errDiv.appendChild(h2);
            
            const p = document.createElement('p');
            p.textContent = msg;
            errDiv.appendChild(p);
            
            const backBtn = document.createElement('a');
            backBtn.href = '/';
            backBtn.className = 'back-btn';
            backBtn.style.marginTop = '20px';
            backBtn.textContent = '← Back to Home';
            errDiv.appendChild(backBtn);
            
            container.appendChild(errDiv);
        }
    </script>

    <script src="/assets/js/loader.min.js?v=en14" defer></script>

    <!-- Analytics Tracking -->
    <script src="/assets/js/analytics.min.js?v=en14" defer></script>
</body>
